<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Survival Road Game</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

      #introScreen, #loadingScreen, #gameOver {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        text-align: center; z-index: 300;
      }
      #introScreen { background: linear-gradient(to bottom, rgba(0,0,0,0.95), rgba(20,20,40,0.98)); color: white; }
      #introScreen h1 { font-size: 72px; margin: 0 0 20px 0; text-shadow: 0 0 30px #ff5733; letter-spacing: 4px; }
      #introScreen .player-info { font-size: 28px; margin: 15px 0; opacity: 0.9; }
      #introScreen .subtitle { font-size: 22px; margin-top: 40px; opacity: 0.7; }

      #loadingScreen { background-color: rgba(0,0,0,0.85); color: white; }
      #gameOver { background-color: rgba(0,0,0,0.9); color: white; }
    </style>
  </head>
  <body>

    <!-- Loading -->
    <div id="loadingScreen">
      <h2 id="loadingText">Loading Game...</h2>
      <p>Please wait</p>
      <div class="spinner"></div>
    </div>

    <!-- Splash -->
    <div id="introScreen" style="display:none">
      <h1>SURVIVAL ROAD</h1>
      <div class="player-info">Runner: <strong>makentake</strong></div>
      <div class="subtitle">Survive as long as you can...</div>
    </div>

    <div id="gameOver" style="display:none">
      <h2>Game Over!</h2>
      <p>You reached Level <span id="finalLevel">1</span> and survived <span id="finalTime">0</span> seconds.</p>
      <button onclick="restartGame()">Play Again</button>
    </div>

    <!-- LEVEL 1 SCENE -->
    <a-scene id="scene1" physics="debug: false" loading-screen="enabled: false" 
             vr-mode-ui="enabled: true" style="display:none">
      <a-assets>
        <a-asset-item id="carModel" src="car.glb"></a-asset-item>
        <a-asset-item id="building1" src="building1.glb"></a-asset-item>
        <a-asset-item id="building2" src="building2.glb"></a-asset-item>
      </a-assets>

      <a-entity id="car1" position="0 0.5 0">
        <a-entity id="carVisual" gltf-model="#carModel" scale="2 2 2" position="0 0.4 1.8" rotation="0 90 0"></a-entity>
        <a-entity position="0 0.3 2.75">
          <a-camera look-controls="pointerLockEnabled: true"></a-camera>
          
          <!-- 3D HUD -->
          <a-entity id="hud" position="0 0.8 -1.5">
            <a-plane width="1.2" height="0.3" color="#000000" opacity="0.6" position="0 0.2 0"></a-plane>
            <a-text id="hudLevel" value="LEVEL 1" color="#4CAF50" position="-0.45 0.2 0.01" align="left" width="0.8"></a-text>
            <a-text id="hudTime" value="Time: 0.0s" color="#ffffff" position="0.45 0.2 0.01" align="right" width="0.8"></a-text>
          </a-entity>

          <!-- Level Start Hint -->
          <a-entity id="vrLevelHint" position="0 1.2 -2.5" visible="false">
            <a-plane width="2.2" height="0.9" color="#000000" opacity="0.75" position="0 0 0"></a-plane>
            <a-text id="vrHintText" value="LEVEL 1\nSURVIVE 30 SECONDS" color="#4CAF50" align="center" width="1.9" position="0 0.1 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="road1"></a-entity>
      <a-plane position="0 -10 0" rotation="-90 0 0" width="200" height="200" color="#222" static-body visible="false"></a-plane>
      <a-sky color="#87CEEB"></a-sky>
      <a-light type="ambient" color="#BBB" intensity="0.4"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.8" position="-1 3 2"></a-light>
    </a-scene>

    <!-- LEVEL 2 SCENE (identical structure) -->
    <a-scene id="scene2" physics="debug: false" loading-screen="enabled: false" 
             vr-mode-ui="enabled: true" style="display:none">
      <a-assets>
        <a-asset-item id="carModel" src="car.glb"></a-asset-item>
        <a-asset-item id="building1" src="building1.glb"></a-asset-item>
        <a-asset-item id="building2" src="building2.glb"></a-asset-item>
      </a-assets>

      <a-entity id="car2" position="0 0.5 0">
        <a-entity id="carVisual" gltf-model="#carModel" scale="2 2 2" position="0 0.4 1.8" rotation="0 90 0"></a-entity>
        <a-entity position="0 0.3 2.75">
          <a-camera look-controls="pointerLockEnabled: true"></a-camera>
          <a-entity id="hud" position="0 0.8 -1.5">
            <a-plane width="1.2" height="0.3" color="#000000" opacity="0.6" position="0 0.2 0"></a-plane>
            <a-text id="hudLevel" value="LEVEL 2" color="#ffcc00" position="-0.45 0.2 0.01" align="left" width="0.8"></a-text>
            <a-text id="hudTime" value="Time: 0.0s" color="#ffffff" position="0.45 0.2 0.01" align="right" width="0.8"></a-text>
          </a-entity>

          <a-entity id="vrLevelHint" position="0 1.2 -2.5" visible="false">
            <a-plane width="2.2" height="0.9" color="#000000" opacity="0.75" position="0 0 0"></a-plane>
            <a-text id="vrHintText" value="LEVEL 2\nHARDER MODE" color="#ffcc00" align="center" width="1.9" position="0 0.1 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="road2"></a-entity>
      <a-plane position="0 -10 0" rotation="-90 0 0" width="200" height="200" color="#222" static-body visible="false"></a-plane>
      <a-sky color="#112233"></a-sky>
      <a-light type="ambient" color="#BBB" intensity="0.4"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.8" position="-1 3 2"></a-light>
    </a-scene>

    <!-- AUDIO -->
    <audio id="bgMusic" loop preload="auto"></audio>
    <audio id="winSound" preload="auto"></audio>
    <audio id="loseSound" preload="auto"></audio>

    <script>
      let gameActive = false;
      let time = 0;
      let currentLevel = 1;
      let roadSegments = [];
      let decorations = [];
      let currentScene, currentCar, currentRoad, currentCarVisual, hudLevel, hudTime, vrLevelHint, vrHintText;
      let lastRowHadBuildings = false;

      const segmentLength = 15;
      const roadWidth = 21;
      const segmentWidth = 4.2;
      let holeProbability = 0.015;
      const level1TimeGoal = 30;
      const roadSpeed = 0.38;
      const turnSpeed = 0.22;

      const introScreen = document.getElementById('introScreen');
      const loadingScreen = document.getElementById('loadingScreen');
      const gameOverScreen = document.getElementById('gameOver');

      const bgMusic = document.getElementById('bgMusic');
      const winSound = document.getElementById('winSound');
      const loseSound = document.getElementById('loseSound');

      let musicMuted = false;

      function setupAudio() {
        bgMusic.src = "AchtungPanzer.wav";
        winSound.src = "winSound.mp3";
        loseSound.src = "loseSound.mp3";
        bgMusic.volume = 0.65;
      }

      function startGameFlow() {
        loadingScreen.style.display = 'flex';
        setTimeout(() => {
          loadingScreen.style.display = 'none';
          showMainIntro();
        }, 1100);
      }

      function showMainIntro() {
        introScreen.style.display = 'flex';
        setTimeout(() => {
          introScreen.classList.add('fade-out');
          setTimeout(() => {
            introScreen.style.display = 'none';
            startLevel1();
          }, 1500);
        }, 2800);
      }

      function startLevel1() {
        loadingScreen.style.display = 'flex';
        document.getElementById('loadingText').textContent = 'Loading Level 1...';

        currentScene = document.getElementById('scene1');
        currentCar = document.getElementById('car1');
        currentRoad = document.getElementById('road1');
        currentCarVisual = currentCar.querySelector('#carVisual');
        hudLevel = currentScene.querySelector('#hudLevel');
        hudTime = currentScene.querySelector('#hudTime');
        vrLevelHint = currentScene.querySelector('#vrLevelHint');
        vrHintText = currentScene.querySelector('#vrHintText');

        currentScene.style.display = 'block';
        initRoad();

        currentCar.setAttribute('position', '0 0.5 0');

        setTimeout(() => {
          loadingScreen.style.display = 'none';
          showVRLevelHint("LEVEL 1\nSURVIVE 30 SECONDS", "#4CAF50");
          gameActive = true;
          bgMusic.play().catch(() => {});
          updateGame();
        }, 600);
      }

      function transitionToLevel2() {
        gameActive = false;
        winSound.play().catch(() => {});

        document.getElementById('scene1').style.display = 'none';
        currentScene = document.getElementById('scene2');
        currentCar = document.getElementById('car2');
        currentRoad = document.getElementById('road2');
        currentCarVisual = currentCar.querySelector('#carVisual');
        hudLevel = currentScene.querySelector('#hudLevel');
        hudTime = currentScene.querySelector('#hudTime');
        vrLevelHint = currentScene.querySelector('#vrLevelHint');
        vrHintText = currentScene.querySelector('#vrHintText');
        currentScene.style.display = 'block';

        currentLevel = 2;
        holeProbability = 0.038;
        time = 0;

        initRoad();

        setTimeout(() => {
          showVRLevelHint("LEVEL 2\nHARDER MODE", "#ffcc00");
          gameActive = true;
          updateGame();
        }, 600);
      }

      function showVRLevelHint(text, color) {
        if (!vrHintText) return;
        vrHintText.setAttribute('value', text);
        vrHintText.setAttribute('color', color);
        vrLevelHint.setAttribute('visible', 'true');

        setTimeout(() => {
          vrLevelHint.setAttribute('visible', 'false');
        }, 3200);
      }

      function initRoad() {
        currentRoad.innerHTML = '';
        roadSegments = [];
        decorations = [];
        lastRowHadBuildings = false;

        for (let z = 30; z > -380; z -= segmentLength) {
          createRoadRow(z);
          if (!lastRowHadBuildings) {
            addDecorations(z);
            lastRowHadBuildings = true;
          } else {
            lastRowHadBuildings = false;
          }
        }
      }

      function createRoadRow(z) {
        const half = roadWidth / 2;
        const color = currentLevel === 1 ? '#444444' : '#2a2a2a';

        for (let x = -half + segmentWidth/2; x < half; x += segmentWidth) {
          const seg = document.createElement('a-plane');
          seg.setAttribute('width', segmentWidth);
          seg.setAttribute('height', segmentLength);
          seg.setAttribute('position', `${x} 0 ${z}`);
          seg.setAttribute('rotation', '-90 0 0');
          seg.setAttribute('color', color);
          seg.setAttribute('static-body', '');
          currentRoad.appendChild(seg);
          roadSegments.push(seg);
        }
      }

      function addDecorations(z) {
        const leftModel = Math.random() > 0.5 ? '#building1' : '#building2';
        const left = document.createElement('a-entity');
        left.setAttribute('gltf-model', leftModel);
        left.setAttribute('scale', '7 7 7');
        left.setAttribute('position', `-23 0 ${z}`);
        currentRoad.appendChild(left);
        decorations.push(left);

        const rightModel = Math.random() > 0.5 ? '#building1' : '#building2';
        const right = document.createElement('a-entity');
        right.setAttribute('gltf-model', rightModel);
        right.setAttribute('scale', '7 7 7');
        right.setAttribute('position', `23 0 ${z}`);
        right.setAttribute('rotation', '0 180 0');
        currentRoad.appendChild(right);
        decorations.push(right);
      }

      function manageRoad() {
        for (let i = roadSegments.length - 1; i >= 0; i--) {
          const seg = roadSegments[i];
          let pos = seg.getAttribute('position');
          pos.z += roadSpeed;
          seg.setAttribute('position', pos);
          if (pos.z > 40) {
            seg.parentNode.removeChild(seg);
            roadSegments.splice(i, 1);
          }
        }

        for (let i = decorations.length - 1; i >= 0; i--) {
          const deco = decorations[i];
          let pos = deco.getAttribute('position');
          pos.z += roadSpeed;
          deco.setAttribute('position', pos);
          if (pos.z > 70) {
            deco.parentNode.removeChild(deco);
            decorations.splice(i, 1);
          }
        }

        const farthest = roadSegments.length > 0 
          ? Math.min(...roadSegments.map(s => s.getAttribute('position').z))
          : -100;

        if (farthest > -190) {
          createRoadRow(farthest - segmentLength);
          if (!lastRowHadBuildings) {
            addDecorations(farthest - segmentLength);
            lastRowHadBuildings = true;
          } else {
            lastRowHadBuildings = false;
          }
        }
      }

      function removeRandomRoadSegment() {
        if (roadSegments.length === 0) return;
        const carPos = currentCar.getAttribute('position');

        let candidates = roadSegments.filter(seg => {
          const p = seg.getAttribute('position');
          return p.z < carPos.z - 18 && p.z > carPos.z - 80;
        });

        const safe = candidates.filter(seg => {
          const z = seg.getAttribute('position').z;
          const count = roadSegments.filter(s => Math.abs(s.getAttribute('position').z - z) < 1).length;
          return count > 2;
        });

        candidates = safe.length > 0 ? safe : candidates;
        if (candidates.length === 0) return;

        const toRemove = candidates[Math.floor(Math.random() * candidates.length)];
        const idx = roadSegments.indexOf(toRemove);
        if (idx > -1) {
          toRemove.parentNode.removeChild(toRemove);
          roadSegments.splice(idx, 1);
        }
      }

      function updateGame() {
        if (!gameActive) return;

        time += 0.016;
        if (hudTime) hudTime.setAttribute('value', `Time: ${time.toFixed(1)}s`);
        if (hudLevel) hudLevel.setAttribute('value', `LEVEL ${currentLevel}`);

        const carPos = currentCar.getAttribute('position');
        const camera = currentScene.querySelector('a-camera');

        // === IMPROVED YAW FOR MOBILE VR (Android WebXR) ===
        let yawDegrees = 0;
        if (camera.object3D) {
          const direction = new THREE.Vector3();
          camera.object3D.getWorldDirection(direction);
          yawDegrees = Math.atan2(direction.x, direction.z) * (180 / Math.PI);
        }

        const yawRad = yawDegrees * (Math.PI / 180);
        const moveX = Math.sin(yawRad) * turnSpeed;

        carPos.x += moveX;
        carPos.x = Math.max(-9, Math.min(9, carPos.x));
        currentCar.setAttribute('position', carPos);

        if (currentCarVisual) {
          let targetRotation = 90;
          if (Math.abs(moveX) > 0.001) {
            const steerAngle = Math.atan2(moveX, turnSpeed) * (180 / Math.PI);
            targetRotation = 90 - steerAngle;
          }
          currentCarVisual.setAttribute('rotation', `0 ${targetRotation} 0`);
        }

        manageRoad();
        if (Math.random() < holeProbability) removeRandomRoadSegment();

        if (currentLevel === 1 && time >= level1TimeGoal) {
          transitionToLevel2();
          return;
        }

        let onRoad = false;
        for (const seg of roadSegments) {
          const segPos = seg.getAttribute('position');
          if (Math.abs(carPos.x - segPos.x) < segmentWidth / 2 + 0.9 &&
              Math.abs(carPos.z - segPos.z) < segmentLength / 2 + 2.2) {
            onRoad = true;
            break;
          }
        }

        if (!onRoad || carPos.y < -5) {
          bgMusic.pause();
          loseSound.play().catch(() => {});
          endGame();
          return;
        }

        requestAnimationFrame(updateGame);
      }

      function endGame() {
        gameActive = false;

        const sceneEl = currentScene;
        const vrGameOver = document.createElement('a-entity');
        vrGameOver.setAttribute('position', '0 1.4 -2.5');

        const bg = document.createElement('a-plane');
        bg.setAttribute('width', '2.4');
        bg.setAttribute('height', '1.1');
        bg.setAttribute('color', '#000000');
        bg.setAttribute('opacity', '0.85');
        vrGameOver.appendChild(bg);

        const text = document.createElement('a-text');
        text.setAttribute('value', 'GAME OVER\nExit VR to restart');
        text.setAttribute('color', '#ff4444');
        text.setAttribute('align', 'center');
        text.setAttribute('width', '2.0');
        text.setAttribute('position', '0 0.1 0.01');
        vrGameOver.appendChild(text);

        sceneEl.appendChild(vrGameOver);

        document.getElementById('finalTime').textContent = time.toFixed(1);
        document.getElementById('finalLevel').textContent = currentLevel;
        gameOverScreen.style.display = 'flex';
      }

      function restartGame() {
        location.reload();
      }

      window.addEventListener('load', () => {
        setupAudio();
        startGameFlow();
      });
    </script>
  </body>
</html>
